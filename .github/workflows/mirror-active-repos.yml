name: Mirror Active Repositories

on:
  schedule:
    - cron: "41 2 * * *"
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build mirror matrix
        id: matrix
        shell: sh
        run: |
          matrix_json=$(python3 scripts/build_mirror_matrix.py config/repos.mirrored.csv)
          entry_count=$(python3 - "$matrix_json" <<'PY'
          import json
          import sys

          payload = json.loads(sys.argv[1])
          print(len(payload.get("include", [])))
          PY
          )
          printf 'matrix=%s\n' "$matrix_json" >> "$GITHUB_OUTPUT"
          printf 'count=%s\n' "$entry_count" >> "$GITHUB_OUTPUT"

  mirror:
    needs:
      - build-matrix
    if: needs.build-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mirror repository
        id: mirror
        shell: sh
        env:
          SOURCE_READ_TOKEN: ${{ secrets.SOURCE_READ_TOKEN }}
          TARGET_PUSH_TOKEN: ${{ secrets.TARGET_PUSH_TOKEN }}
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          export MIRROR_OUTPUT_FILE="$GITHUB_OUTPUT"
          scripts/mirror_repo.sh \
            "${{ matrix.source_path }}" \
            "${{ matrix.target_repo }}"

      - name: Update intake issue sync metadata
        if: always() && (steps.mirror.outcome == 'success' || steps.mirror.outcome == 'failure')
        shell: sh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          synced_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          python3 scripts/update_intake_issue_sync_status.py \
            "${{ matrix.source_path }}" \
            "${{ matrix.target_repo }}" \
            "${{ steps.mirror.outcome }}" \
            "$synced_at" \
            "${{ steps.mirror.outputs.default_branch || 'n/a' }}" \
            "${{ steps.mirror.outputs.source_head_sha || 'n/a' }}" \
            "$run_url"
