name: Reconcile Meta Repository

on:
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    concurrency:
      group: reconcile-meta-repo-state
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        shell: sh
        env:
          TOFU_VERSION: 1.10.7
        run: |
          scripts/install_tofu.sh "$TOFU_VERSION" "$HOME/.local/bin"
          printf '%s\n' "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Reconcile managed repositories with OpenTofu
        shell: sh
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          TOFU_STATE_PASSPHRASE: ${{ secrets.TOFU_STATE_PASSPHRASE }}
        run: scripts/tofu_apply_repos.sh config/repos.mirrored.csv

      - name: Commit and push state updates
        shell: sh
        env:
          GIT_AUTHOR_NAME: unofficial-postmarketos-bot
          GIT_AUTHOR_EMAIL: actions@users.noreply.github.com
          GIT_COMMITTER_NAME: unofficial-postmarketos-bot
          GIT_COMMITTER_EMAIL: actions@users.noreply.github.com
        run: |
          if [ -z "$(git status --porcelain -- terraform.tfstate)" ]; then
            printf 'state unchanged; nothing to commit\n'
            exit 0
          fi

          git add terraform.tfstate
          git commit -m "chore(tofu): reconcile encrypted state"
          git push origin HEAD:main
