name: Sync Public Repositories

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync public repository manifest
        shell: sh
        env:
          GITLAB_BASE_URL: https://gitlab.postmarketos.org
          GITLAB_GROUP_PATH: postmarketOS
        run: scripts/sync_public_repos.sh config/repos.csv

      - name: Commit and push manifest updates
        shell: sh
        env:
          GIT_AUTHOR_NAME: unofficial-postmarketos-bot
          GIT_AUTHOR_EMAIL: actions@users.noreply.github.com
          GIT_COMMITTER_NAME: unofficial-postmarketos-bot
          GIT_COMMITTER_EMAIL: actions@users.noreply.github.com
        run: |
          if [ -z "$(git status --porcelain -- config/repos.csv)" ]; then
            printf 'manifest unchanged; nothing to commit\n'
            exit 0
          fi

          git add config/repos.csv
          git commit -m "sync public postmarketOS repository list"
          git push origin HEAD:main
